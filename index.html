<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: lightgray;
        }

        .container {
            background-color: pink;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            margin-top: 10%;
            border-radius: 30px;
            height: 300px;
        }

        .warning {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="text-align: left;">Type Your Message:</h1>
        <textarea id="messageInput" rows="5" cols="50"></textarea>
        <p id="Count">0/200 Characters</p>
        <p id="Warning" class="warning"></p>
    </div>
    <script>

        const textarea = document.getElementById("messageInput");
        const counter = document.getElementById("Count");
        const warning = document.getElementById("Warning");

        const maxChars = 200;



        textarea.addEventListener("input", function () {
            let typed = textarea.value.length;
            let remaining = maxChars - typed;  

            
            counter.textContent = typed + "/" + maxChars + " characters";

            
            if (typed >= maxChars) {
                warning.textContent = "Character limited!";
                textarea.value = textarea.value.substring(0, maxChars); 
            } else {
                warning.textContent = ""; 
            }
        });

    </script>

</body>

</html>
